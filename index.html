<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>羊群歸圈・聽牧人的聲音</title>
<meta name="description" content="各色小羊聽牧人的聲音——連起同款,一隻一隻領回羊圈,一隻也不失落!(約10,和合本)">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<meta name="theme-color" content="#3f7a34">
<style>
  html,body{margin:0;padding:0;height:100%;background:#1c3a22;overflow:hidden;touch-action:none;
    font-family:"Microsoft JhengHei","PingFang TC",system-ui,sans-serif;-webkit-user-select:none;user-select:none}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  canvas{display:block;background:#8fc97a;border-radius:6px;touch-action:none}
</style>
</head>
<body>
<div id="wrap"><canvas id="cv"></canvas></div>
<script src="game.js"></script>
<script>
// play-stats 三層匿名計數(lobby-play-rank):開啟 10 分去重;-start/-done 不去重;-done 帶 t=秒。零個資。
(function(){
  var host = location.hostname;
  if (host === 'localhost' || host === '127.0.0.1' || location.protocol === 'file:') return;
  window.__ping = function(key, t){
    try{
      var u = 'https://hfpc-play-stats.summer09201017.workers.dev/api/ping?g=' + key + (t ? '&t=' + t : '');
      if (navigator.sendBeacon) navigator.sendBeacon(u); else fetch(u, { mode: 'no-cors' });
    }catch(e){}
  };
  try{
    var k = 'ping-sheepfold-tsum', now = Date.now(), last = 0;
    try{ last = +localStorage.getItem(k) || 0; }catch(e){}
    if (now - last > 10*60*1000){ window.__ping('sheepfold-tsum'); try{ localStorage.setItem(k, ''+now); }catch(e){} }
  }catch(e){}
})();
if ('serviceWorker' in navigator && location.protocol === 'https:') {
  addEventListener('load', function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); });
}
</script>
</body>
</html>
